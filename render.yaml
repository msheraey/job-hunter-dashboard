services:
  - type: web
    name: job-hunter-dashboard
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SHEET_ID
        sync: false
      - key: GOOGLE_CREDENTIALS
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
